<!DOCTYPE html>
<html lang="ja" dir="ltr">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Cookie test</title>
  </head>
  <body>

    <p style="font-size: 45px" id="checked">Cookieは...</p>
    <script type="text/javascript">

      function enable_check(){
        var elem = document.getElementById("checked");
        // キャッシュがあるか
        if(document.cookie !== ""){
          elem.innerHTML += "<p style='color: yellow;'>ある</p>";
          var w = document.cookie.split( '; ' );
          alert(w);
        } else {
        // なければ作成
          var expire = new Date();
          expire.setTime( expire.getTime() + 1000 * 60 );

          document.cookie = 'data=123;expires=' + expire.toUTCString();
          document.cookie = 'data2=abc;expires=' + expire.toUTCString();
          elem.innerHTML += "<p style='color: red;'>ない</p>";
        }
      }

      enable_check();
    </script>

  </body>
</html>
