name: Update README cards

on:
  schedule:
    - cron: "0 * * * *" 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pull request for card updates
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: Update README cards
          title: "Update README cards"
          body: "Automated update of generated README cards."
          branch: automation/update-readme-cards
          delete-branch: true
          add-paths: profile/*.svg
