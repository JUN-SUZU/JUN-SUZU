<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>ショップジェネレーター Login</title>
	<link rel="stylesheet" type="text/css" href="login.css">
  <script type="text/javascript">
    const signinform = document.getElementById("signinform");
    function signinbutton(){
      var xhr = new XMLHttpRequest();
      xhr.open('POST', 'https://script.google.com/macros/s/AKfycbyo4LoBVr6GZh3Lf60CuulM8XbKyEsinJs7smIyEaIojGf588lK2MnytLIz8MEJ5dP9/exec');
      xhr.setRequestHeader('content-type', 'application/x-www-form-urlencoded;charset=UTF-8');
      xhr.send( signinform );
      xhr.onreadystatechange = function() {
        if(xhr.readyState === 4 && xhr.status === 200){
          console.log( xhr.responseText );
        }
      }
    };
  </script>
</head>
<body>
  <h1>マイアカウントにログイン</h1>

<div class="signin-form">
  <form id="signinform" method="POST">
      <label for="gamertag">ユーザ名</label><br>
      <input id="gamertag" name="gamertag" type="text" placeholder="ゲーマータグを入力"><br>
      <label for="password">パスワード</label><br>
      <input id="password" name="password" type="password" placeholder="パスワードを入力"><br>
      <button name="signin" type="button" id="signin" onclick="signinbutton();">ログインする</button>
  </form>
</div>

<div>
  <h1 id="result"></h1>
</div>

</body>
</html>
