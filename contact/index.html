<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact - JUN-SUZU</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/home.css">
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="/">JUN-SUZU</a>
    </div>
  </header>
  <main>
    <section class="container contact-section">
      <h1>お問い合わせ</h1>
      <p class="muted">以下はテンプレートです。送信先は <a href="https://app.jun-suzu.net/contact">app.jun-suzu.net/contact</a> に設定しており、fetch API で POST 送信します。</p>
      <form id="contactForm" class="contact-form" action="https://app.jun-suzu.net/contact" method="post" accept-charset="UTF-8">
        <input type="hidden" name="source" value="jun-suzu-site">
        <label>お名前（任意）
          <input type="text" name="name" placeholder="例：山田 太郎" autocomplete="name">
        </label>
        <label>メールアドレス（必須）
          <input type="email" name="email" required placeholder="name@example.com" autocomplete="email">
        </label>
        <label>件名
          <input type="text" name="subject" placeholder="件名を入力してください" autocomplete="off">
        </label>
        <label>メッセージ（必須）
          <textarea name="message" rows="6" required placeholder="ご用件を記入してください"></textarea>
        </label>
        <div class="form-actions">
          <button type="submit" class="btn">送信</button>
          <button type="button" id="saveDraft" class="btn ghost">下書き保存</button>
        </div>
      </form>
      <div id="formNotice" aria-live="polite" class="form-notice">送信すると外部 API へ POST されます。</div>
    </section>
  </main>
  <nav>
    <ul class="container nav-list" id="mainNav">
      <li><a href="/"><ion-icon name="home-outline" class="inline__icon"></ion-icon>Home</a></li>
      <li><a href="/projects/"><ion-icon name="layers-outline" class="inline__icon"></ion-icon>Projects</a></li>
      <li><a href="/links/"><ion-icon name="link-outline" class="inline__icon"></ion-icon>Links</a></li>
      <li><a href="/donate/"><ion-icon name="heart-outline" class="inline__icon"></ion-icon>Donate</a></li>
      <li><a href="/contact/"><ion-icon name="mail-outline" class="inline__icon"></ion-icon>Contact</a></li>
    </ul>
  </nav>
  <footer>
    <p class="cpr">© 2026 JUN-SUZU</p>
  </footer>
  <script src="/script/main.js"></script>
</body>
</html>
